<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajib Top-Up House Admin</title>

<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:#fff;
}

header{
background:#ff6a00;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

input{
padding:10px;
width:250px;
border:none;
border-radius:5px;
margin-bottom:15px;
}

button{
padding:10px 20px;
background:#ff6a00;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#ff8800;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#1f2937;
}

th{
background:#ff6a00;
padding:12px;
}

td{
padding:12px;
border:1px solid #333;
text-align:center;
}

tr:nth-child(even){
background:#222b3c;
}
</style>

</head>

<body>

<header>
Rajib Top-Up House - Admin Panel
</header>

<div class="container">
  <h2>Live Orders</h2>

<input
type="text"
id="search"
placeholder="Search by UID"
onkeyup="searchOrder()">

<table id="ordersTable">

<tr>
<th>UID</th>
<th>Name</th>
<th>Mobile</th>
<th>Package</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

<br>

<button onclick="logout()">
Logout
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script>
function logout(){
  window.location="login.html";
}

db.collection("orders")
.onSnapshot(function(snapshot){
.onSnapshot(function(snapshot){

const table=document.getElementById("ordersTable");

table.innerHTML=`
<tr>
<th>UID</th>
<th>Name</th>
<th>Mobile</th>
<th>Package</th>
<th>Status</th>
<th>Action</th>
</tr>`;

snapshot.forEach(function(doc){

const data=doc.data();

table.innerHTML+=`
<tr>
<td>${data.uid||""}</td>
<td>${data.name||""}</td>
<td>${data.mobile||""}</td>
<td>${data.package||""}</td>
<td>${data.status||"Pending"}</td>
<td>
<button onclick="completeOrder('${doc.id}')">✅</button>
<button onclick="deleteOrder('${doc.id}')">❌</button>
</td>
</tr>
`;

});

});

function searchOrder(){

const input=document.getElementById("search").value.toLowerCase();

const rows=document.querySelectorAll("#ordersTable tr");

rows.forEach(function(row,index){

if(index===0)return;

row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";

});

}

function completeOrder(id){

db.collection("orders").doc(id).update({
status:"Completed"
});

}

function deleteOrder(id){

if(confirm("Delete this order?")){

db.collection("orders").doc(id).delete();

}

}
</script>

</body>
</html>
